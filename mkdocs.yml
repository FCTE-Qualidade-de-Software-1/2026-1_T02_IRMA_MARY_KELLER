site_name: Qualidade de Software - 2026-1 T02 IRMA MARY KELLER
site_description: Documentação do projeto de avaliação de qualidade de software - Turma 2, 2026-1
site_author: Equipe IRMA MARY KELLER
site_url: https://fcte-qualidade-de-software-1.github.io/2026-1_T02_IRMA_MARY_KELLER/

repo_name: 2026-1_T02_IRMA_MARY_KELLER
repo_url: https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T02_IRMA_MARY_KELLER

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      toc_depth: 3
  - tables
  - attr_list

nav:
  - Início: index.md
  - Fase 1 - Processo de Avaliação: fase1.md
  - Tabela de Contribuição: contribuicao.md
  - Declaração de Uso de IA: declaracao-ia.md
