site_name: Qualidade de Software - 2026-1 T02 IRMA MARY KELLER
docs_dir: src
site_dir: docs
site_description: Documentação do projeto de avaliação de qualidade de software - Turma 2, 2026-1
site_author: Equipe IRMA MARY KELLER
site_url: https://fcte-qualidade-de-software-1.github.io/2026-1_T02_IRMA_MARY_KELLER/

repo_name: 2026-1_T02_IRMA_MARY_KELLER
repo_url: https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T02_IRMA_MARY_KELLER

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      toc_depth: 3
  - tables
  - attr_list

nav:
  - Início: index.md
  - Fase 1 - Processo de Avaliação: fase1.md
  - Fase 2 - Especificação da Avaliação: fase2.md
  - Fase 3 - Projeto de Avaliação:
    - 1. Planejamento: fase3/planejamento.md
    - 2. Casos de Teste - Funcional e Confiabilidade: fase3/casos-funcional-confiabilidade.md
    - 3. Casos de Teste - Manutenibilidade: fase3/casos-manutenibilidade.md
    - 4. Ferramentas e Ambiente: fase3/ferramentas.md
  - Fase 4 - Execução da Avaliação:
    - 1. Dados Brutos Coletados: fase4/dados-brutos.md
    - 2. Cálculo das Métricas: fase4/metricas.md
    - 3. Avaliação das Hipóteses: fase4/hipoteses.md
    - 4. Melhorias Sugeridas: fase4/melhorias.md
  - Tabela de Contribuição: contribuicao.md
  - Declaração de Uso de IA: declaracao-ia.md
